<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  role="img"
  aria-labelledby="title desc"
>
  <defs>
    <style>
      .title-text {
        font-family: 'IBM Plex Sans JP', sans-serif;
        font-size: 40px;
        fill: black;
        dominant-baseline: middle;
      }
      .footer-text {
        font-family: 'IBM Plex Sans JP', sans-serif;
        font-size: 54px;
        fill: black;
        text-anchor: end;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="hsl(25, 100%, 70%)" />
  <rect width="1140" height="570" x="30" y="30" fill="white" />
  <rect width="1140" height="8" x="30" y="220" fill="url(#rainbow-bg)" />
  <text x="60" y="120" class="title-text">{{{TITLE}}}</text>
  <text x="1140" y="500" class="footer-text">yuma14.net</text>
  <image x="70" y="320" width="320" height="320" 
  href="data:image/png;base64," />
</svg>
